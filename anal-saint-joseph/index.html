<!doctype html>
<html lang="hu">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            Analitikai Szent József megáldja a SOTAX kioldódásvizsgálót
        </title>
        <meta
            name="description"
            content="Egy fél-modern, fél-középkori egyoldalas tisztelgés Analitikai Szent József előtt."
        />

        <style>
            :root {
                --bg-0: #09051a;
                --bg-1: #0f2a4a;
                --bg-2: #2a1142;
                --ink: #f3efe6;
                --ink-2: rgba(243, 239, 230, 0.82);
                --gold: #d9b86c;
                --gold-2: rgba(217, 184, 108, 0.55);
                --cya: #00f0ff;
                --card: rgba(10, 8, 18, 0.62);
                --card-2: rgba(255, 255, 255, 0.06);
                --border: rgba(217, 184, 108, 0.35);
                --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
                --radius: 22px;
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
            }
            body {
                margin: 0;
                color: var(--ink);
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Helvetica,
                    Arial,
                    "Apple Color Emoji",
                    "Segoe UI Emoji";
                background:
                    radial-gradient(
                        1200px 900px at 15% 20%,
                        rgba(0, 240, 255, 0.1),
                        transparent 55%
                    ),
                    radial-gradient(
                        900px 700px at 85% 70%,
                        rgba(217, 184, 108, 0.12),
                        transparent 55%
                    ),
                    linear-gradient(
                        120deg,
                        var(--bg-0),
                        var(--bg-1),
                        var(--bg-2)
                    );
                overflow-x: hidden;
            }

            /* Subtle medieval parchment texture overlay */
            .texture {
                pointer-events: none;
                position: fixed;
                inset: 0;
                opacity: 0.14;
                background-image:
                    radial-gradient(
                        1200px 900px at 20% 35%,
                        rgba(255, 255, 255, 0.12),
                        transparent 55%
                    ),
                    radial-gradient(
                        900px 700px at 70% 75%,
                        rgba(255, 255, 255, 0.08),
                        transparent 55%
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(255, 255, 255, 0.03) 0px,
                        rgba(255, 255, 255, 0.03) 1px,
                        transparent 3px,
                        transparent 7px
                    );
                mix-blend-mode: overlay;
            }

            /* Animated aurora layer (CSS driven; JS will gently drift it too) */
            .aurora {
                pointer-events: none;
                position: fixed;
                inset: -20%;
                filter: blur(26px) saturate(1.1);
                opacity: 0.55;
                background:
                    radial-gradient(
                        40% 35% at 20% 30%,
                        rgba(0, 240, 255, 0.18),
                        transparent 65%
                    ),
                    radial-gradient(
                        38% 40% at 80% 55%,
                        rgba(217, 184, 108, 0.2),
                        transparent 65%
                    ),
                    radial-gradient(
                        40% 40% at 35% 85%,
                        rgba(168, 85, 247, 0.14),
                        transparent 65%
                    );
                transform: translate3d(0, 0, 0);
                will-change: transform;
            }

            /* Canvas particles go behind content */
            canvas#bg {
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                pointer-events: none;
                opacity: 0.9;
            }

            .wrap {
                position: relative;
                z-index: 1;
                min-height: 100%;
                display: grid;
                place-items: center;
                padding: clamp(16px, 4vw, 48px);
            }

            header {
                position: fixed;
                top: 16px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 2;
                display: flex;
                gap: 10px;
                align-items: center;
                padding: 10px 14px;
                border-radius: 999px;
                background: rgba(10, 8, 18, 0.35);
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(10px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
                color: var(--ink-2);
                font-size: 13px;
                letter-spacing: 0.02em;
            }
            .sigil {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 30% 30%,
                    var(--cya),
                    rgba(0, 240, 255, 0.15)
                );
                box-shadow: 0 0 18px rgba(0, 240, 255, 0.35);
            }

            .card {
                width: min(980px, 100%);
                border-radius: var(--radius);
                background: linear-gradient(
                    180deg,
                    var(--card),
                    rgba(10, 8, 18, 0.46)
                );
                border: 1px solid rgba(217, 184, 108, 0.28);
                box-shadow: var(--shadow);
                overflow: hidden;
                position: relative;
            }

            /* Ornamental frame corners */
            .card::before,
            .card::after {
                content: "";
                position: absolute;
                width: 180px;
                height: 180px;
                border-radius: 28px;
                border: 1px solid rgba(217, 184, 108, 0.22);
                background: linear-gradient(
                    135deg,
                    rgba(217, 184, 108, 0.1),
                    transparent 65%
                );
                filter: blur(0px);
                opacity: 0.75;
                pointer-events: none;
            }
            .card::before {
                top: -80px;
                left: -80px;
                transform: rotate(18deg);
            }
            .card::after {
                bottom: -80px;
                right: -80px;
                transform: rotate(-18deg);
            }

            .inner {
                padding: clamp(18px, 3.6vw, 44px);
                display: grid;
                gap: 18px;
                text-align: center;
            }

            .motto {
                font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
                font-size: clamp(16px, 2.4vw, 22px);
                letter-spacing: 0.02em;
                color: var(--gold);
                text-shadow: 0 0 24px rgba(217, 184, 108, 0.18);
                margin: 0;
            }

            .rule {
                height: 1px;
                width: min(560px, 90%);
                margin: 0 auto;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(217, 184, 108, 0.65),
                    transparent
                );
                opacity: 0.9;
            }

            figure {
                margin: 0;
                display: grid;
                gap: 10px;
                justify-items: center;
            }

            .img-frame {
                width: min(500px, 100%);
                height: max(500px, 100%);
                aspect-ratio: 3 / 4;
                border-radius: 18px;
                background:
                    radial-gradient(
                        120% 120% at 30% 20%,
                        rgba(0, 240, 255, 0.12),
                        transparent 50%
                    ),
                    radial-gradient(
                        100% 100% at 80% 60%,
                        rgba(217, 184, 108, 0.14),
                        transparent 55%
                    ),
                    rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
                overflow: hidden;
                position: relative;
            }

            /* Add a subtle “illumination” edge */
            img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                filter: contrast(1.03) saturate(1.05);
            }

            figcaption {
                color: var(--ink-2);
                font-size: 14px;
                max-width: 60ch;
                line-height: 1.45;
            }

            blockquote {
                margin: 8px auto 0;
                padding: 14px 16px;
                width: min(760px, 100%);
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(217, 184, 108, 0.22);
                color: var(--ink);
                font-size: clamp(16px, 2.2vw, 20px);
                line-height: 1.45;
                position: relative;
            }
            blockquote::before {
                content: "❝";
                position: absolute;
                left: 12px;
                top: 6px;
                font-size: 22px;
                color: rgba(217, 184, 108, 0.65);
            }
            blockquote::after {
                content: "❞";
                position: absolute;
                right: 12px;
                bottom: 6px;
                font-size: 22px;
                color: rgba(217, 184, 108, 0.65);
            }

            .footer {
                margin-top: 8px;
                color: rgba(243, 239, 230, 0.62);
                font-size: 12px;
                letter-spacing: 0.02em;
            }

            .btnrow {
                display: flex;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 8px;
            }
            .btn {
                appearance: none;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(10, 8, 18, 0.38);
                color: var(--ink);
                padding: 10px 12px;
                border-radius: 999px;
                cursor: pointer;
                font-size: 13px;
                backdrop-filter: blur(10px);
                transition:
                    transform 0.12s ease,
                    border-color 0.12s ease,
                    background 0.12s ease;
            }
            .btn:hover {
                transform: translateY(-1px);
                border-color: rgba(217, 184, 108, 0.34);
                background: rgba(255, 255, 255, 0.06);
            }

            /* Responsive tweaks */
            @media (max-width: 520px) {
                header span {
                    display: none;
                }
                figcaption {
                    font-size: 13px;
                }
            }

            /* Respect reduced motion */
            @media (prefers-reduced-motion: reduce) {
                .aurora {
                    display: none;
                }
                canvas#bg {
                    display: none;
                }
                .btn {
                    transition: none;
                }
            }
        </style>
    </head>

    <body>
        <div class="aurora" id="aurora"></div>
        <canvas id="bg" aria-hidden="true"></canvas>
        <div class="texture" aria-hidden="true"></div>

        <header>
            <span class="sigil" aria-hidden="true"></span>
            <span>Memtech Labs • Illumination Mode</span>
        </header>

        <main class="wrap">
            <section
                class="card"
                role="region"
                aria-label="Analitikai Szent József one-pager"
            >
                <div class="inner">
                    <p class="motto">
                        Sancte Ioseph Analytice, ora pro nobis et pro
                        instrumentis nostris.
                    </p>
                    <div class="rule" aria-hidden="true"></div>

                    <figure>
                        <div class="img-frame">
                            <img
                                src="/assets/joseph.png"
                                alt="Analitikai Szent József megáld egy kioldódásvizsgáló készüléket"
                                loading="lazy"
                            />
                        </div>
                        <figcaption>
                            Ahol a módszer találkozik a reménnyel, ott néha egy
                            áldás is elfér a jegyzőkönyv margóján. 🧪✨
                        </figcaption>
                    </figure>

                    <blockquote>
                        Az USP-nek megfelel, most menj békében!
                    </blockquote>

                    <div class="btnrow" aria-label="Apró interakciók">
                        <button class="btn" id="toggleGlow" type="button">
                            ✨ Aura erősítése
                        </button>
                        <button class="btn" id="toggleMotes" type="button">
                            🌫️ Mote-ok ki/be
                        </button>
                    </div>

                    <div class="footer">
                        Memtech Kft mottóját már tudjuk. Az sem baj, ha lány.
                    </div>
                </div>
            </section>
        </main>

        <script>
            // Subtle animated background: drifting aurora + floating "motes" (dust/embers)
            (function () {
                const prefersReduced =
                    window.matchMedia &&
                    window.matchMedia("(prefers-reduced-motion: reduce)")
                        .matches;
                if (prefersReduced) return;

                const aurora = document.getElementById("aurora");
                const canvas = document.getElementById("bg");
                const ctx = canvas.getContext("2d", { alpha: true });

                let w = 0,
                    h = 0,
                    dpr = Math.max(
                        1,
                        Math.min(2, window.devicePixelRatio || 1),
                    );
                let t0 = performance.now();
                let motesOn = true;
                let glowBoost = false;

                const motes = [];
                const MOTES = 70; // keep it light

                function resize() {
                    w = Math.floor(window.innerWidth);
                    h = Math.floor(window.innerHeight);
                    canvas.width = Math.floor(w * dpr);
                    canvas.height = Math.floor(h * dpr);
                    canvas.style.width = w + "px";
                    canvas.style.height = h + "px";
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                    // re-seed motes
                    motes.length = 0;
                    for (let i = 0; i < MOTES; i++) {
                        motes.push(spawnMote(true));
                    }
                }

                function rand(min, max) {
                    return min + Math.random() * (max - min);
                }

                function spawnMote(initial = false) {
                    const size = rand(0.8, 2.6);
                    return {
                        x: initial ? rand(0, w) : rand(-40, w + 40),
                        y: initial
                            ? rand(0, h)
                            : Math.random() < 0.5
                              ? -40
                              : h + 40,
                        vx: rand(-0.08, 0.14),
                        vy: rand(-0.1, 0.1),
                        r: size,
                        a: rand(0.05, 0.22),
                        tw: rand(0.6, 1.4), // twinkle speed
                        ph: rand(0, Math.PI * 2), // phase
                    };
                }

                function draw(now) {
                    const dt = Math.min(0.05, (now - t0) / 1000);
                    t0 = now;

                    // Aurora drift (tiny)
                    const time = now * 0.00008;
                    const ax = Math.sin(time) * 1.6;
                    const ay = Math.cos(time * 1.2) * 1.2;
                    aurora.style.transform = `translate3d(${ax}%, ${ay}%, 0)`;

                    // Particles
                    ctx.clearRect(0, 0, w, h);
                    if (motesOn) {
                        ctx.save();
                        ctx.globalCompositeOperation = "lighter";

                        for (let i = 0; i < motes.length; i++) {
                            const m = motes[i];
                            m.x += m.vx * (60 * dt);
                            m.y += m.vy * (60 * dt);

                            // soft drift upward bias
                            m.y += -0.1 * (60 * dt);

                            // wrap / respawn
                            if (
                                m.x < -60 ||
                                m.x > w + 60 ||
                                m.y < -60 ||
                                m.y > h + 60
                            ) {
                                motes[i] = spawnMote(false);
                                continue;
                            }

                            const tw =
                                (Math.sin(now * 0.001 * m.tw + m.ph) + 1) * 0.5; // 0..1
                            const alpha =
                                m.a *
                                (0.55 + 0.8 * tw) *
                                (glowBoost ? 1.35 : 1.0);

                            // Two-toned motes: cyan + gold hints
                            // (We avoid hard-coded colors in CSS only; JS is fine and subtle)
                            const grad = ctx.createRadialGradient(
                                m.x,
                                m.y,
                                0,
                                m.x,
                                m.y,
                                m.r * 8,
                            );
                            grad.addColorStop(0, `rgba(0,240,255,${alpha})`);
                            grad.addColorStop(
                                0.55,
                                `rgba(217,184,108,${alpha * 0.55})`,
                            );
                            grad.addColorStop(1, "rgba(0,0,0,0)");

                            ctx.fillStyle = grad;
                            ctx.beginPath();
                            ctx.arc(
                                m.x,
                                m.y,
                                m.r * (1.2 + tw * 0.6),
                                0,
                                Math.PI * 2,
                            );
                            ctx.fill();
                        }

                        ctx.restore();
                    }

                    requestAnimationFrame(draw);
                }

                // Buttons
                document
                    .getElementById("toggleMotes")
                    .addEventListener("click", () => {
                        motesOn = !motesOn;
                    });
                document
                    .getElementById("toggleGlow")
                    .addEventListener("click", () => {
                        glowBoost = !glowBoost;
                        aurora.style.opacity = glowBoost ? "0.72" : "0.55";
                    });

                window.addEventListener("resize", resize, { passive: true });
                resize();
                requestAnimationFrame(draw);
            })();
        </script>
    </body>
</html>
